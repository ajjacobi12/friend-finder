<!DOCTYPE html>
<html>
<head>
    <title>Socket Master Dashboard</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 550px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .online { background: #d4edda; color: #155724; }
        .offline { background: #f8d7da; color: #721c24; }
        .card { border-top: 2px solid #eee; padding-top: 15px; margin-top: 15px; }
        
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; }
        .setup-input { width: 70%; }
        
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-create { background: #28a745; color: white; }
        .btn-join { background: #007bff; color: white; }
        .btn-send { background: #007bff; color: white; padding: 10px 20px; }
        
        .btn-kick { background: #dc3545; color: white; margin-left: 5px; }
        .btn-transfer { background: #f39c12; color: white; margin-left: 5px; }
        .btn-dm { background: #6f42c1; color: white; margin-left: 5px; }

        /* --- user display styles ---*/
        .user-offline { 
            background-color: #eeeeee !important; 
            opacity: 0.6; 
            filter: grayscale(1); 
            transition: 0.3s;
        }

        /* --- Color Picker Styles --- */
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; margin-bottom: 15px; }
        .color-circle { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.1s; }
        .color-circle:hover { transform: scale(1.1); }
        .color-circle.selected { border-color: #333; box-shadow: 0 0 8px rgba(0,0,0,0.2); }

        /* --- Chat Styles --- */
        .msg-actions { display: none; margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 4px; gap: 8px; }
        .my-msg:hover .msg-actions { display: flex; }
        .btn-msg-action { background: none; border: 1px solid white; color: white; padding: 2px 6px; font-size: 9px; opacity: 0.8; }
        .btn-msg-action:hover { opacity: 1; background: rgba(255,255,255,0.1); }
        .edited-indicator { font-size: 10px; font-style: italic; opacity: 0.7; margin-left: 5px; }
        .deleted-msg { font-style: italic; opacity: 0.5; }
        #editModeBar { display: none; background: #fff3cd; padding: 8px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; border: 1px solid #ffeeba; justify-content: space-between; align-items: center; }

        #chatArea { height: 300px; border: 1px solid #eee; border-radius: 8px; overflow-y: auto; padding: 15px; background: #fafafa; display: flex; flex-direction: column; margin-bottom: 10px; }
        .msg { margin-bottom: 10px; max-width: 85%; padding: 8px 12px; border-radius: 15px; font-size: 14px; display: flex; flex-direction: column; }
        .my-msg { align-self: flex-end !important; background-color: #007bff !important; color: white !important; margin-left: auto !important; }
        .their-msg { align-self: flex-start !important; background-color: #e5e5ea !important; color: black !important; margin-right: auto !important; }
        .dm-msg { border: 2px solid #6f42c1; }
        .msg-low-opacity {
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        
        .typing-indicator { font-size: 12px; font-style: italic; color: #888; height: 20px; margin-bottom: 5px; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .crown { color: #f1c40f; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠 Room Control Center</h2>
    <div id="status" class="status offline">Connecting...</div>

    <div id="setupArea">
        <div class="card">
            <h3>User Identity</h3>
            <input type="text" id="nameInput" placeholder="Your Name" value="Browser Admin">
            <p style="font-size: 10px; color: #999;">UUID: <span id="uuidDisplay">...</span></p>
        </div>
        <div class="card">
            <h3>Create Session</h3>
            <button class="btn-create" style="width: 100%; padding: 15px;" onclick="createSession()">
                🚀 Create New Room
            </button>
        </div>
        <div class="card">
            <h3>Join Session</h3>
            <input type="text" id="joinIdInput" class="setup-input" placeholder="Existing Room ID">
            <button class="btn-join" onclick="joinSession()">Join</button>
        </div>
    </div>

    <div id="roomArea" class="card" style="display:none;">
        <div id="dmIndicator" style="display: none; background: #6f42c1; color: white; padding: 8px; border-radius: 4px; margin-bottom: 10px; justify-content: space-between; align-items: center;">
            <span>Private: <strong id="dmTargetName"></strong></span>
            <button onclick="exitDM()" style="background: white; color: #6f42c1; padding: 2px 8px;">Back to Room</button>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; gap: 10px;">
            <h3>Session: <span id="currentRoomDisplay"></span></h3>
            <div style="display: flex; gap: 5px;">
                <button id="endSessionBtn" style="background:#dc3545; color:white; display:none;" onclick="endSession()">💥 End All</button>
                <button id="leaveBtn" style="background:#6c757d; color:white;" onclick="handleLeaveAttempt()">🚪 Leave</button>
            </div>
        </div>

        <div class="card" style="border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fff; margin-bottom: 10px;">
            <p style="margin: 0 0 5px 0; font-size: 12px; font-weight: bold; color: #555;">Your Color:</p>
            <div id="roomColorGrid" class="color-grid"></div>
        </div>
        
        <div id="chatArea"></div>
        <div id="typingArea" class="typing-indicator"></div>

        <div id="editModeBar">
            <span>✏️ Editing message...</span>
            <button onclick="cancelEdit()" style="background:#dc3545; color:white; padding: 2px 8px;">Cancel</button>
        </div>
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="chatInput" style="flex:1" placeholder="Type a message..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendChat()">
            <button id="sendBtn" class="btn-send" onclick="sendChat()">Send</button>
        </div>

        <p style="margin-top:20px;"><b>Active Users:</b></p>
        <ul id="userList"></ul>
    </div>
</div>

<script>
    const socket = io();
    const colorOptions = ['#a0220c', '#2e8b56', '#1e8fff', '#ffd900', '#8824ec', '#2ec4ff', '#ff9500', '#095517', '#ff00f7', '#091490', '#09f34f', '#ff0000'];
    let myBrowserColor = '#1e8fff';
    
    // Start with whatever is in storage, or null if it's a first-time visit
    let myUUID = localStorage.getItem('browser_uuid');

    // We don't need the "browser-random" logic anymore because the 
    // join/create functions will handle the assignment.
    if (myUUID) {
        document.getElementById('uuidDisplay').innerText = myUUID;
    } else {
        document.getElementById('uuidDisplay').innerText = "Assigning ID...";
    }

    let allActiveUsers = {};
    let myCurrentRoom = null;
    let activeDM = null; 
    let amIHost = false;
    let typingTimeout = null;
    let editingMsgID = null;

    // --- COLOR PICKER ---
    function renderColorPicker() {
        const grid = document.getElementById('roomColorGrid');
        grid.innerHTML = '';
        colorOptions.forEach(color => {
            const circle = document.createElement('div');
            circle.className = `color-circle ${color === myBrowserColor ? 'selected' : ''}`;
            circle.style.backgroundColor = color;
            circle.onclick = () => {
                myBrowserColor = color;
                renderColorPicker(); 
                syncUserUpdate();
            };
            grid.appendChild(circle);
        });
    }

    function syncUserUpdate() {
        if (!myCurrentRoom) return;
        socket.emit('update-user', { 
            profile: {
                name: document.getElementById('nameInput').value, 
                // uuid: myUUID, 
                // sessionID: myCurrentRoom,
                color: myBrowserColor
            }
        });
    }

    // --- SOCKET LISTENERS ---
    socket.on('connect', () => {
        document.getElementById('status').innerText = "Connected";
        document.getElementById('status').className = "status online";
    });

    socket.on('message-edited', (data) => {
        const msgElement = document.querySelector(`[data-msg-id="${data.msgID}"]`);
        if (msgElement) {
            const textDiv = msgElement.querySelector('.msg-text');
            textDiv.innerText = data.newText;
            if (!msgElement.querySelector('.edited-indicator')) {
                const span = document.createElement('span');
                span.className = 'edited-indicator';
                span.innerText = '(edited)';
                textDiv.appendChild(span);
            }
        }
    });

    socket.on('receive-message', (data) => {
        const currentView = activeDM ? activeDM.chatRoomID : myCurrentRoom;
        if (data.chatRoomID !== currentView) return;

        const senderName = allActiveUsers[data.senderUUID]?.name || "Unknown";

        displayMessage({
            msgID: data.msgID, // CHANGED: Consistency with the rest of your app
            sender: senderName,
            senderUUID: data.senderUUID,
            context: data.context,
        }, false, data.chatRoomID.includes('_'));
    });

    socket.on('message-deleted', (data) => {
        const msgEl = document.querySelector(`[data-msg-id="${data.msgID}"]`);
        if (msgEl) {
            msgEl.innerHTML = `<span class="deleted-msg">This message was deleted.</span>`;
            msgEl.style.opacity = "0.5";
        }
    });

    socket.on('user-typing', (data) => {
        const currentView = activeDM ? activeDM.chatRoomID : myCurrentRoom;
        
        if (data.chatRoomID === currentView) {
            // 1. Use userUUID instead of id
            // 2. Ensure we don't show "You are typing" to ourselves
            if (data.userUUID !== myUUID) { 
                // 3. Lookup the name using the UUID
                const typingUser = allActiveUsers[data.userUUID];
                const displayName = typingUser ? typingUser.name : "Someone";
                
                document.getElementById('typingArea').innerText = `${displayName} is typing...`;
            }
        }
    });

    socket.on('user-stop-typing', () => document.getElementById('typingArea').innerText = '');

    socket.on('host-change', (newHostId) => { amIHost = (myUUID === newHostId); });

    socket.on('user-update', (users) => {
        // Standard practice: Update a global lookup object for name resolution
        // This is what we'll use for "User is typing..." names!
        allActiveUsers = {}; 
        users.forEach(u => allActiveUsers[u.uuid] = u);

        // determine if host
        const me = users.find(u => u.uuid === myUUID);
        amIHost = me ? !!me.isHost : false;

        renderUserList();
    });

    socket.on('removed-from-session', () => { alert("Removed from session."); location.reload(); });

    socket.on('session-ended', () => { alert("Session ended."); location.reload(); });

    socket.on('user-status-change', (data) => {
        // 1. Update our local "phonebook"
        if (allActiveUsers[data.userUUID]) {
            allActiveUsers[data.userUUID].status = data.status;
            
            // 2. Trigger the refresh of the UI list locally
            renderUserList(); 
        }
    });

    // --- ACTIONS ---

    // --- LEAVE / END SESSION LOGIC ---
    function handleLeaveAttempt() {
        const users = Object.values(allActiveUsers);
        const otherUsers = users.filter(u => u.uuid !== myUUID);

        // If I am host and others are here, I must promote someone else first
        if (amIHost && otherUsers.length > 0) {
            alert("You are the host! Please 'Promote' someone else before leaving, or 'End All'.");
            return;
        }

        // Otherwise, just leave cleanly
        socket.emit('leave-session', { sessionID: myCurrentRoom }, (res) => {
            if (res.success) {
                location.reload(); // Hard reset back to login screen
            }
        });
    }

    function endSession() {
        // No alert needed as per your request, just nuke it
        socket.emit('end-session', { sessionID: myCurrentRoom }, (res) => {
            if (res.success) {
                location.reload();
            }
        });
    }

   function renderUserList() {
        const list = document.getElementById('userList');
        list.innerHTML = '';
        
        const users = Object.values(allActiveUsers);

        users.forEach(u => {
            const isMe = u.uuid === myUUID; 
            const isOffline = u.status === 'offline';
            
            const li = document.createElement('li');
            if (isOffline) li.classList.add('user-offline');

            li.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <div style="width:12px; height:12px; border-radius:50%; background:${u.color}; margin-right:8px; border:1px solid #ccc;"></div>
                    ${u.isHost ? '<span class="crown">👑</span>' : ''} 
                    ${u.name} ${isMe ? '<i>(You)</i>' : ''} 
                    ${isOffline ? '<small style="margin-left:5px; color:#666;">(Offline)</small>' : ''}
                </div>
                <div>
                    ${!isMe && !isOffline ? `<button class="btn-dm" onclick="enterDM('${u.uuid}', '${u.name}')">DM</button>` : ''}
                    ${amIHost && !isMe ? `
                        <button class="btn-transfer" onclick="transferHost('${u.uuid}')">Promote</button>
                        <button class="btn-kick" onclick="removeUser('${u.uuid}')">Kick</button>
                    ` : ''}
                </div>
            `;
            list.appendChild(li);
        });
        
        // Ensure "End Session" button stays in sync
        const endBtn = document.getElementById('endSessionBtn');
        if (endBtn) {
            endBtn.style.display = amIHost ? 'block' : 'none';
        }
    }

    function createSession() {
        socket.emit('create-session', { 
            existingUUID: null, // Send current (null or old)
            existingProfile: { 
                name: document.getElementById('nameInput').value, 
                color: myBrowserColor 
            } 
        }, (res) => {
            if (res && res.success) {
                // 1. Sync the User UUID (The "Identity Sync")
                if (res.userUUID) {
                    myUUID = res.userUUID;
                    localStorage.setItem('browser_uuid', myUUID);
                    document.getElementById('uuidDisplay').innerText = myUUID;
                }

                // 2. Transition to the room
                // Note: res.sessionID comes from the backend's finalizeSession
                setupUI(res.sessionID);
                console.log("Session Created Successfully:", res.sessionID);
            } else {
                alert("Error creating session: " + (res.error || "Unknown Error"));
            }
        });
    }

    function joinSession() {
        const sessionID = document.getElementById('joinIdInput').value.trim().toUpperCase();
        if (!sessionID) return;

        socket.emit('join-session', { 
            sessionID, 
            existingUUID: null, 
            existingProfile: { 
                name: document.getElementById('nameInput').value, 
                color: myBrowserColor 
            } 
        }, (res) => {
            if (res.success || res.exists) {
                if (res.userUUID) {
                    myUUID = res.userUUID;
                    localStorage.setItem('browser_uuid', myUUID);
                    document.getElementById('uuidDisplay').innerText = myUUID;
                }
                setupUI(sessionID);
            } else {
                alert("Room not found or session full.");
            }
        });
    }

    function setupUI(sessionID) {
        myCurrentRoom = sessionID; // Ensure this matches the server's cleanSessionID
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('roomArea').style.display = 'block';
        document.getElementById('currentRoomDisplay').innerText = sessionID;
        renderColorPicker();
        syncUserUpdate();

        window.addEventListener('beforeunload', () => {
            if (myCurrentRoom) {
                socket.emit('leave-session', { sessionID: myCurrentRoom });
                socket.disconnect(); // Force the buffer to flush before the page dies
            }
        });
    }

    function enterDM(targetUUID, targetName) {
        // 1. Keep the ID generation (Auuid_Buuid) to filter your local chat view
        const dmRoomID = [myUUID, targetUUID].sort().join('_');
        
        // 2. Update your local state
        activeDM = { uuid: targetUUID, name: targetName, chatRoomID: dmRoomID };
        
        // 3. UI Updates
        document.getElementById('dmIndicator').style.display = 'flex';
        document.getElementById('dmTargetName').innerText = targetName;
        
        // 4. Clear the chat area to show only DM history (if you're storing it)
        document.getElementById('chatArea').innerHTML = ''; 
        
        // NOTE: socket.emit('join-dm') is REMOVED. 
        // The backend already knows your UUID and handles routing via your handlers.
        console.log(`Entering DM view with ${targetName} (${dmRoomID})`);
    }

    function exitDM() {
        activeDM = null;
        document.getElementById('dmIndicator').style.display = 'none';
        document.getElementById('dmTargetName').innerText = '';
        
        // Clear DM messages and let your main chat logic re-render the session messages
        document.getElementById('chatArea').innerHTML = ''; 
        
        console.log("Returned to Global Session Chat");
    }

    function handleTyping() {
        // Determine the room ID (session ID or DM room ID)
        const currentRoomID = activeDM ? activeDM.chatRoomID : myCurrentRoom;

        // REMOVED 'name' - the server already knows who you are via the socket session!
        socket.emit('typing', { chatRoomID: currentRoomID });

        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            socket.emit('stop-typing', { chatRoomID: currentRoomID });
        }, 2000);
    }

    function sendChat() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        // Use the unified room ID logic you established in the backend
        const currentRoomID = activeDM ? activeDM.chatRoomID : myCurrentRoom;
        if(!currentRoomID) return;

        if (editingMsgID) {
            // Updated to use 'msgID' to match CLEANING_MAP
            socket.emit('edit-message', { 
                chatRoomID: currentRoomID, 
                msgID: editingMsgID, 
                newText: text 
            }, (response) => {
                if (response.success) {
                    const msgEl = document.querySelector(`[data-msg-id="${editingMsgID}"]`);
                    if (msgEl) {
                        msgEl.querySelector('.msg-text').innerText = text;
                        // ... (rest of your edit UI logic)
                    }
                    cancelEdit();
                }
            });
        } else {
            // Generate a clean UUID for the message (standard practice)
            const msgID = (window.crypto && window.crypto.randomUUID) 
                ? window.crypto.randomUUID() 
                : 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);

            const messageData = {
                msgID: msgID, // CHANGED from 'id' to 'msgID'
                chatRoomID: currentRoomID,
                context: { 
                    text: text,
                    isEncrypted: false, // Matches your msgContextSchema
                    version: "1.0"
                }
            };

            // UNIFIED EVENT: No more 'send-direct-message'
            socket.emit('send-message', messageData, (response) => {
                if (response.success) {
                    // Find the optimistic message by ID and make it solid (1.0 opacity)
                    const msgEl = document.querySelector(`[data-msg-id="${msgID}"]`);
                    if (msgEl) msgEl.classList.remove('msg-low-opacity');
                    // Now that server confirmed, we could update status if we wanted
                    console.log("Message delivered at:", response.serverTimestamp);
                } else {
                    console.error("Message failed:", response.error);
                }
            });

            // Optimistic UI Update
            displayMessage({
                msgID: msgID,         // CHANGED from id to msgID
                sender: "You",
                senderUUID: myUUID,
                context: messageData.context,
                isDM: !!activeDM,
                status: 'pending'     // Adding this ensures your lower opacity logic kicks in!
            }, true, !!activeDM);
        }

        input.value = '';
        socket.emit('stop-typing', { chatRoomID: currentRoomID });
    }

    function prepareEdit(msgID, currentText) {
        editingMsgID = msgID;
        document.getElementById('chatInput').value = currentText;
        document.getElementById('editModeBar').style.display = 'flex';
        document.getElementById('sendBtn').innerText = 'Save';
        document.getElementById('chatInput').focus();
    }

    function cancelEdit() {
        editingMsgID = null;
        document.getElementById('chatInput').value = '';
        document.getElementById('editModeBar').style.display = 'none';
        document.getElementById('sendBtn').innerText = 'Send';
    }

    function confirmDelete(msgID) {
        if (confirm("Delete this message?")) {
            const currentRoomID = activeDM ? activeDM.chatRoomID : myCurrentRoom;
            
            // Changed field name to msgID
            socket.emit('delete-message', { 
                chatRoomID: currentRoomID, 
                msgID: msgID 
            }, (response) => {
                if (response.success) {
                    const msgEl = document.querySelector(`[data-msg-id="${msgID}"]`);
                    if (msgEl) {
                        msgEl.innerHTML = `<span class="deleted-msg">You deleted this message.</span>`;
                        msgEl.style.opacity = "0.5";
                    }
                }
            });
        }
    }

    function transferHost(targetId) { if(confirm("Promote user to host?")) socket.emit('transfer-host', { sessionID: myCurrentRoom, newHostUUID: targetId }); }
    function removeUser(targetId) { if(confirm("Kick user?")) socket.emit('remove-user', { sessionID: myCurrentRoom, userUUIDToRemove: targetId }); }

    function displayMessage(data, amISender, isDM) {
        const chatArea = document.getElementById('chatArea');
        
        // 1. UPDATED: use data.msgID instead of data.id
        const messageID = data.msgID || data.id; 
        if (messageID && document.querySelector(`[data-msg-id="${messageID}"]`)) return;

        const div = document.createElement('div');
        
        // 2. SAVED PREFERENCE: Apply lower opacity if status is pending or failed
        const statusClass = (data.status === 'pending' || data.status === 'failed') ? 'msg-low-opacity' : '';
        div.className = `msg ${amISender ? 'my-msg' : 'their-msg'} ${isDM ? 'dm-msg' : ''} ${statusClass}`;
        
        if (messageID) div.setAttribute('data-msg-id', messageID);

        // 3. UPDATED: Contextual text nesting
        const text = data.context?.text || data.text || "...";

        div.innerHTML = `
            <span style="font-size: 10px; font-weight: bold; margin-bottom: 2px; opacity: 0.8;">
                ${isDM ? '🔒 ' : ''}${amISender ? 'You' : data.sender}
            </span>
            <div class="msg-text">${text}</div>
            ${amISender ? `
                <div class="msg-actions">
                    <button class="btn-msg-action" onclick="prepareEdit('${messageID}', '${text.replace(/'/g, "\\'")}')">Edit</button>
                    <button class="btn-msg-action" onclick="confirmDelete('${messageID}')">Delete</button>
                </div>
            ` : ''}
        `;

        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }
</script>
</body>
</html>
